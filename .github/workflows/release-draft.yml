name: Update Draft Release

on:
  push:
    branches: main

permissions:
  contents: write
  pull-requests: write

jobs:
  draft-release:
    name: Update Draft Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0

      - name: Publish the release notes
        uses: release-drafter/release-drafter@v6.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
